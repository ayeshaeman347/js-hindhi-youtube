<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .quiz-card {
      background: #1e293b;
      border-radius: 20px;
      padding: 40px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .progress-bar { background: #334155; border-radius: 99px; height: 6px; margin-bottom: 32px; }
    .progress-fill { background: #f59e0b; height: 100%; border-radius: 99px; transition: width 0.4s ease; }
    .q-num { color: #64748b; font-size: 0.85rem; margin-bottom: 10px; }
    .question { font-size: 1.3rem; font-weight: 600; color: #f1f5f9; margin-bottom: 28px; line-height: 1.5; }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option-btn {
      padding: 16px 20px;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 12px;
      color: #f1f5f9;
      font-size: 1rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
    }
    .option-btn:hover:not(:disabled) { border-color: #f59e0b; background: #1e293b; }
    .option-btn.correct { border-color: #22c55e; background: #14532d; color: white; }
    .option-btn.wrong { border-color: #ef4444; background: #7f1d1d; color: white; }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.8; }
    .feedback { margin-top: 20px; font-size: 0.95rem; font-weight: 500; min-height: 24px; }
    .feedback.correct { color: #22c55e; }
    .feedback.wrong { color: #ef4444; }
    .next-btn {
      margin-top: 24px;
      width: 100%;
      padding: 16px;
      background: #f59e0b;
      color: #0f172a;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: none;
    }
    .result { text-align: center; }
    .result h2 { font-size: 1.6rem; margin-bottom: 12px; color: #f59e0b; }
    .result .score { font-size: 4rem; font-weight: 700; color: #38bdf8; margin: 16px 0; }
    .result p { color: #94a3b8; margin-bottom: 28px; }
    .restart-btn {
      padding: 14px 36px;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .loading { text-align: center; color: #64748b; padding: 40px 0; }
  </style>
</head>
<body>
  <div class="quiz-card" id="app">
    <div class="loading">⏳ Loading questions...</div>
  </div>

  <script>
    // ✅ Demonstrates: Promises, async/await, scope, closures, hoisting, DOM

    // ---- DATA ----
    const questions = [
      {
        question: "Which keyword is used to declare a variable that cannot be reassigned?",
        options: ["var", "let", "const", "static"],
        answer: "const"
      },
      {
        question: "What does DOM stand for?",
        options: ["Data Object Model", "Document Object Model", "Design Object Manager", "Document Oriented Markup"],
        answer: "Document Object Model"
      },
      {
        question: "Which method adds an element to the end of an array?",
        options: ["pop()", "shift()", "push()", "splice()"],
        answer: "push()"
      },
      {
        question: "What is a closure in JavaScript?",
        options: [
          "A function that runs immediately",
          "A function with access to its outer scope's variables",
          "A way to close the browser",
          "A method to stop a loop"
        ],
        answer: "A function with access to its outer scope's variables"
      },
      {
        question: "What does a Promise represent?",
        options: [
          "A synchronous operation",
          "A guaranteed result",
          "A value that will be available in the future",
          "A special kind of array"
        ],
        answer: "A value that will be available in the future"
      }
    ];

    // ---- STATE ----
    let currentIndex = 0;
    let score = 0;

    // ---- PROMISE DEMO: simulate loading data from a server ----
    function loadQuestions() {
      return new Promise(function(resolve, reject) {
        // Simulates network delay (like fetching from an API)
        setTimeout(function() {
          if (questions.length > 0) {
            resolve(questions); // ✅ success: pass data
          } else {
            reject("No questions found!"); // ❌ failure
          }
        }, 1000); // 1 second fake delay
      });
    }

    // ---- ASYNC/AWAIT ----
    async function startQuiz() {
      try {
        const data = await loadQuestions(); // wait for Promise to resolve
        renderQuestion(data[currentIndex]);
      } catch (error) {
        document.getElementById('app').innerHTML = `<p style="color:red">${error}</p>`;
      }
    }

    // ---- RENDER QUESTION ----
    function renderQuestion(q) {
      const progress = ((currentIndex) / questions.length) * 100;
      const app = document.getElementById('app');

      app.innerHTML = `
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${progress}%"></div>
        </div>
        <div class="q-num">Question ${currentIndex + 1} of ${questions.length}</div>
        <div class="question">${q.question}</div>
        <div class="options" id="options">
          ${q.options.map(opt => `<button class="option-btn">${opt}</button>`).join('')}
        </div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="nextBtn">${currentIndex === questions.length - 1 ? 'See Results →' : 'Next →'}</button>
      `;

      // Add click handlers — CLOSURE: each button "closes over" the opt value
      const optBtns = document.querySelectorAll('.option-btn');
      optBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          checkAnswer(btn.textContent, q.answer, optBtns);
        });
      });

      document.getElementById('nextBtn').addEventListener('click', nextQuestion);
    }

    // ---- CHECK ANSWER ----
    function checkAnswer(selected, correct, allBtns) {
      // Disable all buttons after selecting
      allBtns.forEach(btn => btn.disabled = true);

      const feedback = document.getElementById('feedback');
      const nextBtn = document.getElementById('nextBtn');

      if (selected === correct) {
        score++;
        // Mark correct button green
        allBtns.forEach(btn => {
          if (btn.textContent === correct) btn.classList.add('correct');
        });
        feedback.textContent = '✅ Correct!';
        feedback.className = 'feedback correct';
      } else {
        // Mark selected wrong, show correct
        allBtns.forEach(btn => {
          if (btn.textContent === selected) btn.classList.add('wrong');
          if (btn.textContent === correct) btn.classList.add('correct');
        });
        feedback.textContent = `❌ Wrong! Correct: ${correct}`;
        feedback.className = 'feedback wrong';
      }

      nextBtn.style.display = 'block';
    }

    // ---- NEXT QUESTION ----
    function nextQuestion() {
      currentIndex++;
      if (currentIndex < questions.length) {
        renderQuestion(questions[currentIndex]);
      } else {
        showResult();
      }
    }

    // ---- SHOW RESULT ----
    function showResult() {
      const percent = Math.round((score / questions.length) * 100);
      let emoji = percent >= 80 ? '🏆' : percent >= 50 ? '👍' : '💪';
      let msg = percent >= 80 ? 'Excellent work!' : percent >= 50 ? 'Good job!' : 'Keep practicing!';

      document.getElementById('app').innerHTML = `
        <div class="result">
          <h2>${emoji} Quiz Complete!</h2>
          <div class="score">${score}/${questions.length}</div>
          <p>${percent}% — ${msg}</p>
          <button class="restart-btn" id="restartBtn">Try Again</button>
        </div>
      `;
      document.getElementById('restartBtn').addEventListener('click', restartQuiz);
    }

    // ---- RESTART ----
    function restartQuiz() {
      currentIndex = 0;
      score = 0;
      startQuiz();
    }

    // ---- HOISTING DEMO (comment for interview) ----
    // Function declarations are HOISTED — startQuiz() can be called before it's defined
    // Variable declarations with 'var' are hoisted (but not initialized)
    // 'let' and 'const' are NOT hoisted (temporal dead zone)

    startQuiz(); // This works because function declarations are hoisted!
  </script>
</body>
</html>

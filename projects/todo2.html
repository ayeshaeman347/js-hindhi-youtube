<!DOCTYPE html>
<html>
<head>

<title>Todo List</title>

<style>

body{
    font-family:Arial;
}

#app{
    width:400px;
    margin:50px auto;
    text-align:center;
}


input{

    width:70%;
    padding:10px;

}


button{

    padding:10px;
    cursor:pointer;

}


li{

    margin:10px;
    padding:10px;
    border:1px solid black;
    list-style:none;

}


.delete{

    float:right;
    color:red;
    cursor:pointer;

}


.done{

    text-decoration:line-through;

}


</style>

</head>


<body>


<div id="app">

<h2>Todo List</h2>


<input id="taskInput" placeholder="Enter task">


<button id="addBtn">
Add
</button>



<ul id="taskList"></ul>


</div>



<script>


let tasks = [];




// Add Task

function addTask(){


let input = document.getElementById("taskInput");


let text = input.value;



if(text === ""){

return;

}



tasks.push(text);


input.value="";


displayTasks();


}




// Display Tasks

function displayTasks(){


let list = document.getElementById("taskList");


list.innerHTML="";



tasks.forEach(function(task,index){


let li = document.createElement("li");


li.innerHTML = `

${task}

<span class="delete">
Delete
</span>

`;



li.querySelector(".delete")
.addEventListener("click",function(){


tasks.splice(index,1);


displayTasks();


});



list.appendChild(li);



});


}




document.getElementById("addBtn")
.addEventListener("click",addTask);



</script>


</body>
</html>
